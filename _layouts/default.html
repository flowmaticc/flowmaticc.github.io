<!DOCTYPE html>
<html lang="{{ page.lang | default: 'es' }}" data-theme="dark">
<head>
  {% include head.html %}
  {% if page.schema %}
  <script type="application/ld+json">{{ page.schema }}</script>
  {% endif %}
</head>
<body>

  {% include navbar.html %}

  {{ content }}

  {% include footer.html %}

  <script src="/js/main.js?v=1.0"></script>
  <script src="/js/umami-tracking.js?v=1.0" defer></script>
  {% if page.extra_js %}
  <script>{{ page.extra_js }}</script>
  {% endif %}

</body>
</html>
