<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<meta name="robots" content="noindex, follow">
<link rel="stylesheet" href="/css/style.css?v=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* Forzar modo claro siempre */
  :root, [data-theme="dark"], [data-theme="light"] {
    --bg-primary:    #f8fafc;
    --bg-secondary:  #f1f5f9;
    --bg-card:       #ffffff;
    --bg-card-hover: #f8fafc;
    --border:        #e2e8f0;
    --text-primary:  #0f172a;
    --text-secondary:#334155;
    --text-muted:    #64748b;
    --accent:        #6366f1;
    --accent-dark:   #4f46e5;
    --accent-light:  #818cf8;
    --accent-glow:   rgba(99,102,241,0.1);
    --success:       #10b981;
    --warning:       #f59e0b;
  }

  /* Ocultar botón de tema */
  .theme-toggle { display: none !important; }

  /* Layout */
  .legal-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 2rem 80px;
  }

  .doc-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 4px; padding: 5px 12px; font-size: 11px;
    color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 20px;
  }
  .doc-badge::before {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
  }

  .legal-wrap h1 {
    font-size: clamp(24px,4vw,36px); font-weight: 700;
    color: var(--text-primary); line-height: 1.2; margin-bottom: 8px;
  }
  .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 40px; }

  .alert {
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-left: 3px solid var(--success); border-radius: 6px;
    padding: 14px 18px; margin-bottom: 36px;
    font-size: 13px; color: var(--text-secondary);
  }
  .alert strong { color: #166534; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 36px 0; }

  .legal-wrap section { margin-bottom: 36px; }

  .legal-wrap h2 {
    font-size: 11px; font-weight: 700; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .legal-wrap h2::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .legal-wrap h3 {
    font-size: 13px; font-weight: 700;
    color: var(--text-primary); margin: 16px 0 8px;
  }
  .legal-wrap p {
    margin-bottom: 10px; color: var(--text-secondary);
    font-size: 13px; line-height: 1.8;
  }
  .legal-wrap ul, .legal-wrap ol { padding-left: 20px; margin: 10px 0; }
  .legal-wrap ul li, .legal-wrap ol li {
    font-size: 13px; color: var(--text-secondary); padding: 3px 0;
  }
  .legal-wrap a { color: var(--accent); }

  .toc {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 36px;
  }
  .toc-title {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
  }
  .toc ol { padding-left: 16px; }
  .toc li { font-size: 12px; padding: 2px 0; }
  .toc a { color: var(--text-secondary); text-decoration: none; }
  .toc a:hover { color: var(--accent); }

  .legal-wrap table {
    width: 100%; border-collapse: collapse; margin: 12px 0;
    font-size: 12px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .legal-wrap th {
    text-align: left; padding: 8px 12px; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted);
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  }
  .legal-wrap td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    vertical-align: top; color: var(--text-secondary);
  }
  .legal-wrap tr:last-child td { border-bottom: none; }

  @media(max-width:560px) { .legal-wrap { padding: 32px 1rem 60px; } }
</style>
</head>
<body>

{% include navbar.html %}

<main style="padding-top:70px;">
  <div class="legal-wrap">
    {{ content }}
  </div>
</main>

{% include footer.html %}

<script src="/js/main.js?v=1.0"></script>
<script>
  // Forzar modo claro aunque el usuario tenga guardado el oscuro
  document.documentElement.setAttribute('data-theme', 'light');
</script>

</body>
</html>
