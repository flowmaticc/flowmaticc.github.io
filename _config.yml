title: "Flowmatic · Plantillas Macro"
description: "Expansor de texto y plantillas Word para Windows. Escribe / y tu plantilla DOCX u ODT se pega al instante en cualquier aplicación, sin abrir archivos ni interrumpir tu flujo."
url: "https://flowmaticc.github.io"
baseurl: ""

# Plugins habilitados en GitHub Pages
plugins:
  - jekyll-sitemap

# Excluir archivos del build
exclude:
  - README.md
  - "*.bat"
  - node_modules/

# Colecciones
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "es"
  - scope:
      path: "en"
    values:
      layout: "default"
      lang: "en"
