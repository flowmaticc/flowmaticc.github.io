title: "Flowmatic · Plantillas Macro"
description: "Expansor de texto y plantillas Word para Windows. Escribe / y tu plantilla DOCX u ODT se pega al instante en cualquier aplicación, sin abrir archivos ni interrumpir tu flujo."
url: "https://flowmaticc.github.io"
baseurl: ""

# jekyll-sitemap eliminado — usamos sitemap.xml manual con hreflang completo
plugins: []

exclude:
  - README.md
  - "*.bat"
  - node_modules/

collections:
  pages:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "es"
  - scope:
      path: "en"
    values:
      layout: "default"
      lang: "en"
  - scope:
      path: "fr"
    values:
      layout: "default"
      lang: "fr"
  - scope:
      path: "de"
    values:
      layout: "default"
      lang: "de"
  - scope:
      path: "pt"
    values:
      layout: "default"
      lang: "pt"
  - scope:
      path: "zh"
    values:
      layout: "default"
      lang: "zh"
  - scope:
      path: "ru"
    values:
      layout: "default"
      lang: "ru"
  - scope:
      path: "it"
    values:
      layout: "default"
      lang: "it"
