<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
{% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}">{% endif %}
<meta name="robots" content="index, follow">
<meta name="author" content="Flowmatic">

<!-- hreflang: multilanguage SEO -->
{% if page.lang == 'en' %}
  <link rel="alternate" hreflang="en" href="{{ site.url }}/en{{ page.url | remove: '/en' }}">
  <link rel="alternate" hreflang="es" href="{{ site.url }}{{ page.url | remove: '/en' }}">
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url | remove: '/en' }}">
{% else %}
  <link rel="alternate" hreflang="es" href="{{ site.url }}{{ page.url }}">
  <link rel="alternate" hreflang="en" href="{{ site.url }}/en{{ page.url }}">
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url }}">
{% endif %}

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ site.url }}/img/og-image.png">
<meta property="og:locale" content="{% if page.lang == 'en' %}en_US{% else %}es_ES{% endif %}">
<meta property="og:locale:alternate" content="{% if page.lang == 'en' %}es_ES{% else %}en_US{% endif %}">
<meta property="og:site_name" content="Flowmatic · Plantillas Macro">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ site.url }}/img/og-image.png">

<!-- CSS -->
<link rel="stylesheet" href="/css/style.css?v=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

{% if page.extra_css %}
<style>{{ page.extra_css }}</style>
{% endif %}

{% if page.lemon %}
<script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
{% endif %}

<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">

<script defer src="https://cloud.umami.is/script.js" data-website-id="4879f8fb-3949-493c-a64e-83c77bed24ab"></script>
